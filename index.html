<!doctype html>
<html>
  <head>
    <title>Meeting Scheduler</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
  </head>

  <body>
    <header>Meeting Scheduler</header>
    <br />

    <div id="calendar"></div>

    <input
      id="create-meeting-button"
      type="button"
      value="create new meeting"
    />

    <div id="new-meeting-overlay" style="display: none">
      <div id="new-meeting-pop-up">
        <form id="create-meeting" class="new-meeting" action="">
          <fieldset>
            <legend>Create a new meeting</legend>

            <!--Meeting title-->
            <input
              id="meeting-title"
              type="text"
              placeholder="Title"
              required
            />

            <!--Meeting description-->
            <textarea
              id="meeting-description"
              placeholder="Description"
              maxlength="255"
            ></textarea>

            <!--Select date and time range-->

            <fieldset>
              <legend>Select a date/time range</legend>
              <input id="meeting-start-date" type="datetime-local" required />
              <input id="meeting-end-date" type="datetime-local" required />
            </fieldset>

            <!--Set time zone-->
            <label for="time-zone">Select a time-zone:</label>
            <select id="meeting-time-zone" name="time-zone">
              <option>PST</option>
              <option>MST</option>
              <option>CST</option>
              <option>EST</option>
              <option>AST</option>
              <option>NST</option>
            </select>

            <!--Select meeting duration-->
            <fieldset>
              <legend>Select the meeting duration</legend>
              <h3>Time</h3>
              <div id="meeting-duration-container">
                <!-- <label for="meeting-duration-hour">Hours:</label> -->
                <input
                  class="meeting-duration"
                  id="meeting-duration-hour"
                  type="number"
                  value="1"
                  min="1"
                  max="5"
                />

                <h3>:</h3>

                <!-- <label for="meeting-duration-minutes">Minutes</label> -->
                <input
                  id="meeting-duration-minutes"
                  type="number"
                  value="0"
                  min="0"
                  max="45"
                  step="15"
                />
              </div>
            </fieldset>

            <input id="meeting-submit" type="submit" value="Create Meeting" />
          </fieldset>
          <!--Select people:Phase 2-->
        </form>
      </div>
      <div id="available-times-popup">
        <form id="available-times-form">
          <fieldset>
            <legend>Available Times</legend>
            <div id="times-list">
              <div class="available-time-option">
                <span class="start-time">9:00am</span> -
                <span class="end-time">10:00am</span>
              </div>
            </div>
          </fieldset>
        </form>
      </div>
    </div>

    <!--On-click submit button-->
    <!--Get available times-->
    <!--Convert time zones-->

    <div id="select-meeting" class="new-meeting">
      <!--Display available times-->
      <!--Pick time from selection-->
      <!--Alert other team members of proposed meeting-->
      <!--Add new event to schedule-->
    </div>

    <script type="module" src="/src/newMeeting.js"></script>
    <script type="module" src="/src/calendar.js"></script>
  </body>
</html>
